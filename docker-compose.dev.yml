services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: civil
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
      POSTGRES_DB: civil2
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civil -d civil2"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --loglevel verbose
    volumes:
      - redis_dev_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost:3000}
      REDIS_URL: redis://redis:6379
      DB_0: postgres://civil:${DB_PASSWORD:-devpassword}@postgres:5432/civil2
    ports:
      - "${PORT:-4000}:4000"
    volumes:
      - ./src:/app/src:ro

volumes:
  postgres_dev_data:
  redis_dev_data:
